<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 170" width="560" height="170">
  <defs>
    <!-- Soft inner glow on spark -->
    <radialGradient id="sparkGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F4A261;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#F4A261;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#F4A261;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- ═══ ICON MARK ═══ -->
  <!-- Outer embrace arc - teal, rounded ends, protective curve -->
  <path d="M 38 115
           C 18 95, 18 55, 55 38
           C 75 30, 100 30, 100 30
           C 100 30, 125 30, 145 38
           C 182 55, 182 95, 162 115"
        fill="none"
        stroke="#3AB0A1"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Inner soft heart / care shape in deep blue -->
  <!-- Heart using two arcs -->
  <path d="M100 108
           C100 108, 68 90, 68 72
           C68 60, 78 54, 88 57
           C93 59, 98 63, 100 67
           C102 63, 107 59, 112 57
           C122 54, 132 60, 132 72
           C132 90, 100 108, 100 108 Z"
        fill="#3535A8"/>

  <!-- Central spark / glow - warm gold -->
  <!-- Glow aura behind spark -->
  <circle cx="100" cy="62" r="14" fill="#F4A261" opacity="0.18"/>
  <circle cx="100" cy="62" r="9" fill="#F4A261" opacity="0.35"/>
  <!-- Spark star shape: 4 soft petals -->
  <ellipse cx="100" cy="57" rx="3" ry="7" fill="#F4A261" transform="rotate(0,100,62)"/>
  <ellipse cx="100" cy="67" rx="3" ry="7" fill="#F4A261" transform="rotate(0,100,62)"/>
  <ellipse cx="95" cy="62" rx="7" ry="3" fill="#F4A261"/>
  <ellipse cx="105" cy="62" rx="7" ry="3" fill="#F4A261"/>
  <!-- Diagonal petals -->
  <ellipse cx="100" cy="62" rx="2.5" ry="6" fill="#F4A261" transform="rotate(45,100,62)"/>
  <ellipse cx="100" cy="62" rx="2.5" ry="6" fill="#F4A261" transform="rotate(-45,100,62)"/>
  <!-- Centre dot -->
  <circle cx="100" cy="62" r="3.5" fill="#fff" opacity="0.9"/>

  <!-- Bottom baseline dots (ground anchor) -->
  <circle cx="75" cy="128" r="4" fill="#3AB0A1" opacity="0.5"/>
  <circle cx="100" cy="132" r="4" fill="#3535A8" opacity="0.4"/>
  <circle cx="125" cy="128" r="4" fill="#3AB0A1" opacity="0.5"/>

  <!-- ═══ WORDMARK ═══ -->
  <text x="200" y="98"
        font-family="'Nunito','Varela Round','Trebuchet MS',sans-serif"
        font-size="52"
        font-weight="700"
        letter-spacing="-0.5"
        fill="#3535A8">Lucen</text>

  <text x="353" y="98"
        font-family="'Nunito','Varela Round','Trebuchet MS',sans-serif"
        font-size="52"
        font-weight="300"
        letter-spacing="0"
        fill="#3AB0A1">Care</text>

  <!-- Tagline -->
  <text x="201" y="122"
        font-family="'Nunito','Trebuchet MS',sans-serif"
        font-size="11"
        font-weight="400"
        letter-spacing="3.5"
        fill="#3535A8"
        opacity="0.55">HEALING WITH HEART  ·  GUIDED BY LIGHT</text>

  <!-- Gold accent underbar: teal half + gold half -->
  <rect x="201" y="130" width="145" height="2.5" rx="1.25" fill="#3535A8" opacity="0.3"/>
  <rect x="346" y="130" width="120" height="2.5" rx="1.25" fill="#F4A261" opacity="0.85"/>
</svg>
