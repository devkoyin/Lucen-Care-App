<div class="auth-page" [ngClass]="'portal-' + role">
  <div class="auth-card">
    <div class="auth-card__accent"></div>
    <div class="auth-card__body">
      <div class="auth-card__header">
        <span class="auth-card__role-badge">{{ roleName }}</span>
        <h1 class="auth-card__title">Welcome back</h1>
        <p class="auth-card__subtitle">Sign in to your account</p>
      </div>
      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form" novalidate>
        <lc-form-field label="Email" id="login-email" [error]="emailError">
          <input
            id="login-email"
            type="email"
            formControlName="email"
            placeholder="you@example.com"
            autocomplete="email"
          />
        </lc-form-field>
        <lc-form-field label="Password" id="login-password" [error]="passwordError">
          <input
            id="login-password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </lc-form-field>
        @if (serverError) {
          <p class="auth-form__server-error" role="alert">{{ serverError }}</p>
        }
        <a
          class="auth-form__forgot"
          [routerLink]="'/auth/' + role + '/forgot-password'"
        >Forgot password?</a>
        <button type="submit" class="auth-btn" [disabled]="loading">
          @if (loading) { Signing in… } @else { Sign in }
        </button>
      </form>
      <p class="auth-card__footer">
        New here? <a [routerLink]="'/auth/' + role + '/signup'">Create an account</a>
      </p>
    </div>
  </div>
</div>
