<div class="meds-portal">

  <!-- Header -->
  <div class="meds-portal__topbar">
    <div>
      <h1 class="meds-portal__title">My Medications</h1>
      <p class="meds-portal__sub">Manage your prescriptions, schedule and refills</p>
    </div>
  </div>

  <!-- Stats -->
  <div class="meds-portal__stats">
    @for (s of stats; track s.label) {
      <div class="meds-stat">
        <span class="meds-stat__icon">{{ s.icon }}</span>
        <span class="meds-stat__value">{{ s.value }}</span>
        <span class="meds-stat__label">{{ s.label }}</span>
      </div>
    }
  </div>

  <!-- Tab nav -->
  <nav class="meds-nav">
    <a class="meds-nav__tab"
       routerLink="/patient/medications/schedule"
       routerLinkActive="meds-nav__tab--active"
       [routerLinkActiveOptions]="{ exact: true }">
      📅 Schedule
    </a>
    <a class="meds-nav__tab"
       routerLink="/patient/medications/refills"
       routerLinkActive="meds-nav__tab--active"
       [routerLinkActiveOptions]="{ exact: true }">
      🔔 Refill Alerts
    </a>
    <a class="meds-nav__tab"
       routerLink="/patient/medications/all"
       routerLinkActive="meds-nav__tab--active"
       [routerLinkActiveOptions]="{ exact: true }">
      💊 All Medications
    </a>
  </nav>

  <!-- Child page -->
  <router-outlet />

</div>
